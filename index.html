<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobstar QR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

/* BACKGROUND IMAGE */
body {
  background: url("bg.jpg") no-repeat center center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DARK OVERLAY (BIAR ELEGAN) */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35); /* lebih transparan */
  backdrop-filter: blur(4px);   /* blur dikurangi */
}

/* CONTAINER */
.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

/* CARD GLASS */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 22px;
  padding: 24px;
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
}

/* TITLE */
.title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 14px;
  color: #fff;
  text-align: center;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

input::placeholder {
  color: #bbb;
}

/* FILE */
.file {
  display: block;
  text-align: center;
  padding: 12px;
  border-radius: 14px;
  border: 1px dashed rgba(255,255,255,0.3);
  font-size: 13px;
  color: #ccc;
  margin-bottom: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.file.active {
  border-color: #00ffcc;
  color: #00ffcc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.15s ease;
}

/* PRIMARY */
.primary {
  background: linear-gradient(135deg, #00ffcc, #0071e3);
  color: white;
}

/* SECONDARY */
.secondary {
  background: rgba(255,255,255,0.1);
  color: #fff;
}

/* PRESS EFFECT */
button:active {
  transform: scale(0.96);
}

/* QR */
#qr canvas {
  margin-top: 18px;
  border-radius: 18px;
}

/* RESULT */
.result {
  text-align: center;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">

    <div class="title">LOBSTAR QR</div>

    <input id="data" placeholder="Enter text / wallet / WhatsApp">

    <label class="file" id="fileBox">
      <span id="fileText">Add logo (optional)</span>
      <input type="file" id="logo" hidden>
    </label>

    <button class="primary" onclick="generateQR()">Generate</button>
    <button class="secondary" onclick="downloadQR()">Download</button>

    <div class="result">
      <div id="qr"></div>
    </div>

  </div>

</div>

<script>
let qr;

/* FILE */
document.getElementById("logo").addEventListener("change", function() {
  const box = document.getElementById("fileBox");
  const text = document.getElementById("fileText");

  if (this.files.length > 0) {
    box.classList.add("active");
    text.innerText = "✔ Logo added";
  }
});

/* GENERATE */
function randomColor() {
  const colors = [
    ["#00ffcc", "#0071e3"],
    ["#ff00cc", "#3333ff"],
    ["#00ff00", "#009933"],
    ["#ff9900", "#ff3300"],
    ["#00ccff", "#0066ff"],
    ["#ff0066", "#9900ff"]
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

function generateQR() {
  let data = document.getElementById("data").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!data) return alert("Enter something");

  if (/^08/.test(data)) {
    data = "https://wa.me/62" + data.slice(1);
  }

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  const logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  const [color1, color2] = randomColor();

  qr = new QRCodeStyling({
    width: 240,
    height: 240,
    data: data,
    image: logoURL,

    dotsOptions: {
      type: "rounded",
      gradient: {
        type: "linear",
        rotation: Math.random() * Math.PI,
        colorStops: [
          { offset: 0, color: color1 },
          { offset: 1, color: color2 }
        ]
      }
    },

    cornersSquareOptions: {
      type: "extra-rounded",
      color: color1
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 8,
      imageSize: 0.42,
      hideBackgroundDots: true
    }
  });

  qr.append(qrContainer);
}

/* DOWNLOAD */
function downloadQR() {
  if (!qr) return alert("Generate first");
  qr.download({ name: "lobstar-qr", extension: "png" });
}
</script>

</body>
</html>
