<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolQR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: #0b0b0c;
  color: #e4e4e7;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.hero p {
  color: #9ca3af;
  margin-bottom: 20px;
}

.cta {
  padding: 12px 20px;
  border-radius: 12px;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  border: none;
  cursor: pointer;
}

/* FEATURES */
.features {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
}

.feature {
  background: #111113;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #1f1f23;
}

/* APP */
.app {
  max-width: 420px;
  margin: 40px auto;
  padding: 16px;
}

.card {
  background: #111113;
  border-radius: 20px;
  padding: 20px;
  border: 1px solid #1f1f23;
}

/* SWITCH */
.switch {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.switch button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #18181b;
  color: #aaa;
}

.switch .active {
  background: #2563eb;
  color: white;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #1f1f23;
  background: #0f0f11;
  color: white;
  margin-bottom: 10px;
}

/* BUTTON */
.generate {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* QR */
#qr canvas {
  margin-top: 14px;
  border-radius: 16px;
}

/* RESULT */
.result {
  margin-top: 16px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s;
}

.result.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>SolQR</h1>
  <p>Generate Wallet & WhatsApp QR instantly</p>
  <button class="cta" onclick="scrollToApp()">Start Now</button>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="feature">⚡ Instant QR generation</div>
  <div class="feature">💬 WhatsApp direct chat QR</div>
  <div class="feature">💰 Wallet QR for crypto</div>
</section>

<!-- APP -->
<div class="app" id="app">

  <div class="card">

    <div class="switch">
      <button id="walletBtn" class="active" onclick="setMode('wallet')">Wallet</button>
      <button id="waBtn" onclick="setMode('wa')">WhatsApp</button>
    </div>

    <div id="walletInput">
      <input id="wallet" placeholder="Wallet address">
    </div>

    <div id="waInput" style="display:none;">
      <input id="phone" placeholder="Phone number">
      <input id="message" placeholder="Message (optional)">
    </div>

    <button class="generate" onclick="generateQR()">Generate QR</button>

    <div id="result" class="result">
      <div id="qr"></div>
    </div>

  </div>

</div>

<script>
let mode = "wallet";
let qr;

function scrollToApp() {
  document.getElementById("app").scrollIntoView({ behavior: "smooth" });
}

function setMode(m) {
  mode = m;

  document.getElementById("walletBtn").classList.toggle("active", m === "wallet");
  document.getElementById("waBtn").classList.toggle("active", m === "wa");

  document.getElementById("walletInput").style.display = m === "wallet" ? "block" : "none";
  document.getElementById("waInput").style.display = m === "wa" ? "block" : "none";
}

function formatNumber(num) {
  num = num.replace(/\D/g, "");
  if (num.startsWith("0")) return "62" + num.slice(1);
  return num;
}

function generateQR() {
  let data = "";
  let color = "#2563eb";

  if (mode === "wallet") {
    data = document.getElementById("wallet").value;
  } else {
    let phone = formatNumber(document.getElementById("phone").value);
    let msg = document.getElementById("message").value;
    data = "https://wa.me/" + phone;
    if (msg) data += "?text=" + encodeURIComponent(msg);
    color = "#22c55e";
  }

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: data,

    dotsOptions: { color: color, type: "rounded" },
    cornersSquareOptions: { type: "extra-rounded", color: color },
    backgroundOptions: { color: "#ffffff" }
  });

  qr.append(qrContainer);
  document.getElementById("result").classList.add("show");
}
</script>

</body>
</html>
