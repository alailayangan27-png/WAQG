<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  background: #f5f5f7;
  color: #1d1d1f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CONTAINER */
.app {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

/* CARD */
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* TITLE */
.title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 14px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e5ea;
  font-size: 14px;
  margin-bottom: 10px;
  outline: none;
}

input:focus {
  border-color: #0071e3;
}

/* FILE */
.file {
  display: block;
  text-align: center;
  padding: 12px;
  border-radius: 12px;
  border: 1px dashed #d2d2d7;
  font-size: 13px;
  color: #6e6e73;
  margin-bottom: 12px;
  cursor: pointer;
}

.file.active {
  border-color: #0071e3;
  color: #0071e3;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  margin-top: 6px;
}

/* PRIMARY */
.primary {
  background: #0071e3;
  color: white;
}

/* SECONDARY */
.secondary {
  background: #f2f2f2;
  color: #1d1d1f;
}

/* QR */
#qr canvas {
  margin-top: 18px;
  border-radius: 16px;
}

/* RESULT */
.result {
  text-align: center;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">

    <div class="title">QR Generator</div>

    <input id="data" placeholder="Enter text, link, wallet, or WhatsApp">

    <label class="file" id="fileBox">
      <span id="fileText">Add logo (optional)</span>
      <input type="file" id="logo" hidden>
    </label>

    <button class="primary" onclick="generateQR()">Generate</button>
    <button class="secondary" onclick="downloadQR()">Download</button>

    <div class="result">
      <div id="qr"></div>
    </div>

  </div>

</div>

<script>
let qr;

/* FILE */
document.getElementById("logo").addEventListener("change", function() {
  const box = document.getElementById("fileBox");
  const text = document.getElementById("fileText");

  if (this.files.length > 0) {
    box.classList.add("active");
    text.innerText = "Logo added";
  }
});

/* GENERATE */
function generateQR() {
  let data = document.getElementById("data").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!data) return alert("Enter something");

  /* AUTO DETECT WA */
  if (/^08/.test(data)) {
    data = "https://wa.me/62" + data.slice(1);
  }

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  const logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  qr = new QRCodeStyling({
    width: 240,
    height: 240,
    data: data,
    image: logoURL,

    dotsOptions: {
      color: "#000000",
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded"
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 10,
      imageSize: 0.38,
      hideBackgroundDots: true
    }
  });

  qr.append(qrContainer);
}

/* DOWNLOAD */
function downloadQR() {
  if (!qr) return alert("Generate first");
  qr.download({ name: "qr", extension: "png" });
}
</script>

</body>
</html>
